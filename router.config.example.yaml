server:
  http_addr: ":8080"
  public_base_url: "https://router.example.com"
  shutdown_timeout: "10s"

database:
  # Local development can use infra/docker-compose.local.yml.
  url: "http://127.0.0.1:8080"
  auth_token_env: "TURSO_AUTH_TOKEN"

queue:
  provider: "cloudflare"
  push_auth_token_env: "QUEUE_PUSH_AUTH_TOKEN"
  max_batch_size: 100
  ack_timeout: "30s"

retry:
  bolt_path: "/data/retry.db"
  schedule: ["30s", "2m", "10m", "1h", "6h"]

observability:
  log_level: "info"
  metrics_addr: ":9090"

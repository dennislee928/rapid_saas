syntax = "proto3";

package rapid_saas.shared.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/rapid-saas/rapid_saas/12-shared-platform/proto/gen/go/rapid_saas/shared/v1;sharedv1";

message RequestContext {
  string tenant_id = 1;
  string request_id = 2;
  string trace_id = 3;
  string actor_id = 4;
  string source_service = 5;
  string idempotency_key = 6;
}

message ServiceAuthContext {
  string principal = 1;
  repeated string scopes = 2;
  string key_id = 3;
  google.protobuf.Timestamp issued_at = 4;
  google.protobuf.Timestamp expires_at = 5;
}

message Money {
  string currency = 1;
  int64 minor_units = 2;
}

message GeoPoint {
  double latitude = 1;
  double longitude = 2;
}

message ErrorDetail {
  string code = 1;
  string message = 2;
  map<string, string> metadata = 3;
}

enum DecisionOutcome {
  DECISION_OUTCOME_UNSPECIFIED = 0;
  DECISION_OUTCOME_ALLOW = 1;
  DECISION_OUTCOME_REVIEW = 2;
  DECISION_OUTCOME_CHALLENGE = 3;
  DECISION_OUTCOME_BLOCK = 4;
}

enum DeliveryStatus {
  DELIVERY_STATUS_UNSPECIFIED = 0;
  DELIVERY_STATUS_ACCEPTED = 1;
  DELIVERY_STATUS_DELIVERED = 2;
  DELIVERY_STATUS_RETRY_SCHEDULED = 3;
  DELIVERY_STATUS_DEAD_LETTERED = 4;
  DELIVERY_STATUS_REJECTED = 5;
}

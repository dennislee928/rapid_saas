syntax = "proto3";

package rapid_saas.shared.v1;

import "google/protobuf/timestamp.proto";
import "rapid_saas/shared/v1/common.proto";

option go_package = "github.com/rapid-saas/rapid_saas/12-shared-platform/proto/gen/go/rapid_saas/shared/v1;sharedv1";

service WebhookDeliveryService {
  rpc EnqueueWebhook(EnqueueWebhookRequest) returns (EnqueueWebhookResponse);
  rpc GetWebhookDelivery(GetWebhookDeliveryRequest) returns (GetWebhookDeliveryResponse);
  rpc ReplayWebhook(ReplayWebhookRequest) returns (ReplayWebhookResponse);
}

message EnqueueWebhookRequest {
  RequestContext context = 1;
  ServiceAuthContext auth = 2;
  string endpoint_id = 3;
  string event_type = 4;
  string schema_version = 5;
  bytes payload = 6;
  map<string, string> headers = 7;
  google.protobuf.Timestamp not_before = 8;
}

message EnqueueWebhookResponse {
  string delivery_id = 1;
  DeliveryStatus status = 2;
  google.protobuf.Timestamp next_attempt_at = 3;
}

message GetWebhookDeliveryRequest {
  RequestContext context = 1;
  ServiceAuthContext auth = 2;
  string delivery_id = 3;
}

message GetWebhookDeliveryResponse {
  string delivery_id = 1;
  DeliveryStatus status = 2;
  uint32 attempt_count = 3;
  int32 last_http_status = 4;
  string last_error = 5;
  google.protobuf.Timestamp next_attempt_at = 6;
}

message ReplayWebhookRequest {
  RequestContext context = 1;
  ServiceAuthContext auth = 2;
  string delivery_id = 3;
  string replay_reason = 4;
}

message ReplayWebhookResponse {
  string delivery_id = 1;
  string replay_delivery_id = 2;
  DeliveryStatus status = 3;
}

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}
  resource:
    attributes:
      - key: service.namespace
        value: rapid-saas
        action: upsert
      - key: deployment.environment.name
        value: local
        action: upsert

exporters:
  debug:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [debug]


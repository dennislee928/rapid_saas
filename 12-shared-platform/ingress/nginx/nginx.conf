worker_processes auto;

events {
  worker_connections 1024;
}

http {
  server_tokens off;

  log_format gateway_json escape=json
    '{'
      '"time":"$time_iso8601",'
      '"request_id":"$gateway_request_id",'
      '"remote_addr":"$remote_addr",'
      '"method":"$request_method",'
      '"uri":"$request_uri",'
      '"status":$status,'
      '"request_length":$request_length,'
      '"body_bytes_sent":$body_bytes_sent,'
      '"upstream":"$upstream_addr",'
      '"upstream_status":"$upstream_status",'
      '"duration":$request_time'
    '}';

  access_log /var/log/nginx/access.log gateway_json;
  error_log /var/log/nginx/error.log warn;

  limit_req_zone $binary_remote_addr zone=per_ip:10m rate=20r/s;

  upstream security_webhook_router {
    server router:8080;
    keepalive 16;
  }

  upstream routekit_orchestrator {
    server routekit:8080;
    keepalive 16;
  }

  map $http_x_request_id $gateway_request_id {
    default $http_x_request_id;
    "" $request_id;
  }

  map $request_uri $protected_route {
    default 1;
    ~^/healthz$ 0;
    ~^/readyz$ 0;
    ~^/security/(healthz|readyz)$ 0;
    ~^/routekit/healthz$ 0;
  }

  map "$http_x_api_key$http_authorization$http_x_signature$http_x_router_signature$http_x_routekit_sandbox_signature" $has_auth_material {
    default 1;
    "" 0;
  }

  server {
    listen 8080 default_server;

    # Production profile should terminate TLS here or at Cloudflare before this hop.
    # Mount certificates and add a parallel `listen 8443 ssl http2` server block when
    # running outside local development.

    client_max_body_size 1m;
    client_body_timeout 10s;
    keepalive_timeout 65s;

    add_header X-Request-Id $gateway_request_id always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    limit_req zone=per_ip burst=40 nodelay;

    if ($protected_route$has_auth_material = "10") {
      return 401 '{"error":"missing gateway auth material"}';
    }

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Request-Id $gateway_request_id;
    proxy_set_header X-Correlation-Id $gateway_request_id;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /healthz {
      access_log off;
      default_type application/json;
      return 200 '{"status":"ok","service":"shared-ingress"}';
    }

    location /security/ {
      rewrite ^/security/(.*)$ /$1 break;
      proxy_pass http://security_webhook_router;
    }

    location /routekit/ {
      rewrite ^/routekit/(.*)$ /$1 break;
      proxy_pass http://routekit_orchestrator;
    }
  }
}

name = "rapid-saas-realtime-geospatial-api"
main = "src/index.ts"
compatibility_date = "2026-04-25"
compatibility_flags = ["nodejs_compat"]

[vars]
COALESCE_MS = "250"
DEFAULT_RETENTION_TTL_SECONDS = "60"
SUBSCRIBE_TOKEN_TTL_SECONDS = "300"
SUBSCRIBE_JWT_SECRET = "dev-only-change-me"
# Local demo keys. Production should source API keys from Turso and store only hashes.
DEMO_API_KEYS = "{\"pk_live_demo\":{\"tenant_id\":\"tenant_demo\",\"plan\":\"free\",\"ccu_cap\":200,\"write_rps_cap\":100,\"scopes\":[\"publish\",\"admin\"]}}"

[[durable_objects.bindings]]
name = "GROUP_HUB"
class_name = "GroupHub"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GroupHub"]

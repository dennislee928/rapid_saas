name: security-webhook-router

services:
  libsql:
    image: ghcr.io/tursodatabase/libsql-server:latest
    platform: linux/amd64
    ports:
      - "8080:8080"
      - "5001:5001"
    environment:
      SQLD_NODE: primary
      SQLD_HTTP_LISTEN_ADDR: 0.0.0.0:8080
      SQLD_GRPC_LISTEN_ADDR: 0.0.0.0:5001
      SQLD_DB_PATH: /var/lib/sqld/router.db
    volumes:
      - libsql-data:/var/lib/sqld

  router:
    profiles: ["app"]
    build:
      context: ../..
      dockerfile: 05-infra-ci/root/Dockerfile
      args:
        SERVICE_DIR: 02-router-api
        CMD_DIR: ./cmd/router-api
    depends_on:
      - libsql
    ports:
      - "8081:8080"
    env_file:
      - ./env/router.env.example
    environment:
      DATABASE_URL: http://libsql:8080
      BOLT_PATH: /data/retry.db
    volumes:
      - router-data:/data

  routekit:
    profiles: ["app"]
    build:
      context: ../..
      dockerfile: 05-infra-ci/root/Dockerfile
      args:
        SERVICE_DIR: 11-high-risk-payment-router/orchestrator
        CMD_DIR: ./cmd/routekit
    environment:
      ROUTEKIT_HTTP_ADDR: :8080
    ports:
      - "8082:8080"

  ingress:
    profiles: ["app"]
    image: nginx:1.27-alpine
    depends_on:
      - router
      - routekit
    ports:
      - "8090:8080"
    volumes:
      - ../../12-shared-platform/ingress/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  libsql-data:
  router-data:

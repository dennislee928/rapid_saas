name = "security-webhook-ingress"
main = "src/worker.ts"
compatibility_date = "2026-04-25"
workers_dev = false

[vars]
ROUTER_PUSH_URL = "https://security-webhook-router.fly.dev/queue/cloudflare"

[[kv_namespaces]]
binding = "ENDPOINT_CONFIG"
id = "replace-with-kv-namespace-id"
preview_id = "replace-with-preview-kv-namespace-id"

[[queues.producers]]
binding = "WEBHOOK_EVENTS"
queue = "security-webhook-events"

[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

[[migrations]]
tag = "v1"
new_classes = ["RateLimiter"]

[[routes]]
pattern = "in.example.com/w/*"
zone_name = "example.com"

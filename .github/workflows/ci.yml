name: CI

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      deploy_fly:
        description: "Run Fly.io deploy placeholder"
        required: false
        default: "false"
      deploy_cloudflare:
        description: "Run Cloudflare deploy placeholder"
        required: false
        default: "false"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect project files
        id: detect
        shell: bash
        run: |
          if find . -path ./.git -prune -o -name go.mod -print -quit | grep -q .; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi
          if find . -path ./.git -prune -o -name package.json -print -quit | grep -q .; then
            echo "node=true" >> "$GITHUB_OUTPUT"
          else
            echo "node=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-go@v5
        if: steps.detect.outputs.go == 'true'
        with:
          go-version: "1.22"
          cache: true

      - name: Go fmt check
        if: steps.detect.outputs.go == 'true'
        shell: bash
        run: |
          test -z "$(gofmt -l .)"

      - name: Go test
        if: steps.detect.outputs.go == 'true'
        run: go test ./...

      - uses: actions/setup-node@v4
        if: steps.detect.outputs.node == 'true'
        with:
          node-version: "22"
          cache: "npm"

      - name: Node install
        if: steps.detect.outputs.node == 'true'
        run: npm ci

      - name: Node lint
        if: steps.detect.outputs.node == 'true'
        run: npm run lint --if-present

      - name: Node test
        if: steps.detect.outputs.node == 'true'
        run: npm test --if-present

      - name: Scaffold-only notice
        if: steps.detect.outputs.go != 'true' && steps.detect.outputs.node != 'true'
        run: echo "No Go or Node app code detected; scaffold validation only."

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4

      - name: Detect Go router
        id: detect
        shell: bash
        run: |
          if test -f go.mod && test -d cmd/router; then
            echo "router=true" >> "$GITHUB_OUTPUT"
          else
            echo "router=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build router image
        if: steps.detect.outputs.router == 'true'
        run: docker build --build-arg SERVICE_DIR=. -t security-webhook-router:${{ github.sha }} .

      - name: Docker placeholder
        if: steps.detect.outputs.router != 'true'
        run: echo "Dockerfile added; image build will run when go.mod and cmd/router exist."

  deploy-placeholders:
    name: Deploy placeholders
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Fly.io deploy placeholder
        if: inputs.deploy_fly == 'true'
        run: |
          echo "Configure FLY_API_TOKEN, then replace this placeholder with:"
          echo "flyctl deploy --config infra/fly/fly.toml --remote-only"

      - name: Cloudflare deploy placeholder
        if: inputs.deploy_cloudflare == 'true'
        run: |
          echo "Configure CLOUDFLARE_API_TOKEN and project paths, then run wrangler deploy/pages deploy from the app directories."
